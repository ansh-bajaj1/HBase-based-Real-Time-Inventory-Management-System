server:
  port: 8080

spring:
  application:
    name: hbase-inventory-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: inventory-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

inventory:
  kafka:
    topic: ${INVENTORY_TOPIC:inventory-updates}
  low-stock-threshold: ${LOW_STOCK_THRESHOLD:10}
  auth:
    jwt-secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  hbase:
    zookeeper-quorum: ${HBASE_ZOOKEEPER_QUORUM:hbase}
    zookeeper-port: ${HBASE_ZOOKEEPER_PORT:2181}
    inventory-table: inventory
    logs-table: inventory_logs

logging:
  level:
    root: INFO
    com.bda.inventory: DEBUG
